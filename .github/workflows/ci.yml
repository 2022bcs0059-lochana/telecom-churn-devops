name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-train-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m pytest

      - name: Train Model
        run: |
          cd ml
          python train.py

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: ml/model.pkl

      - name: Build Stage 1 Docker Image
        run: docker build -t churn-devops .

      - name: Build Stage 2 ML Docker Image
        run: docker build -f Dockerfile.ml -t churn-ml .
